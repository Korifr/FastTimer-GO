<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <link rel="stylesheet" href="/assets/cooldown.css">
        <title>FastTimer-GO</title>
    </head>
    <body class="timer-page">
        <div class="timer-screen">
            <div class="timer-fill" id="timerFill"></div>
            <span class="timer-display" id="timerDisplay">0 : 00</span>
            <div class="timer-controls" id="timerControls">
                <button onClick="goBack()">Retour</button>
                <button onClick="restart()">Redémarrer</button>
            </div>
        </div>

    
        <script src="/assets/cooldown.js"></script>
    </body>
</html>
