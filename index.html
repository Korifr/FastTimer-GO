<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <link rel="stylesheet" href="/assets/style.css">
        <title>FastTimer-GO</title>
    </head>
    <body>
        <div class="theme-switcher">
            <button data-theme="1" onClick="setTheme(1)"></button>
            <button data-theme="2" onClick="setTheme(2)"></button>
            <button data-theme="3" onClick="setTheme(3)"></button>
        </div>
        <div class="header">   
            <h1>Choose Your<br> Timer</h1>
        </div>
        <div class="timer-list">   
            <div class="timer-list-inner">
                <span id="zero">0 : 30</span>
                <span id="one">1 : 00</span>
                <span id="two">1 : 30</span>
                <span id="three">2 : 00</span>
                <span id="four">2 : 30</span>
                <span id="five">3 : 00</span>
                <span id="six">5 : 00</span>
            </div>
        </div>
        
        <script src="/assets/script.js"></script>
    </body>
</html>
